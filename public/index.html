<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Orbitron:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/login.css" />
    <title>TaskFlow — Sign in</title>
  </head>
  <body class="login-body">
    <div class="scene" id="scene">
      <div class="scene__grid" aria-hidden="true"></div>
      <div class="cube" aria-hidden="true">
        <div class="cube__face cube__face--front"></div>
        <div class="cube__face cube__face--back"></div>
        <div class="cube__face cube__face--right"></div>
        <div class="cube__face cube__face--left"></div>
        <div class="cube__face cube__face--top"></div>
        <div class="cube__face cube__face--bottom"></div>
      </div>
      <div class="orb orb--1" aria-hidden="true"></div>
      <div class="orb orb--2" aria-hidden="true"></div>
      <div class="orb orb--3" aria-hidden="true"></div>
    </div>

    <main class="login-wrap">
      <div class="login-card" id="login-card">
        <div class="login-card__glow" aria-hidden="true"></div>
        <header class="login-card__header">
          <span class="login-logo">TF</span>
          <h1>TaskFlow</h1>
          <p>Your daily task command center</p>
        </header>

        <div class="auth-tabs" role="tablist">
          <button type="button" class="auth-tab is-active" data-tab="login" role="tab">
            Sign in
          </button>
          <button type="button" class="auth-tab" data-tab="register" role="tab">
            Register
          </button>
        </div>

        <form id="form-login" class="auth-form" data-panel="login">
          <label class="field">
            <span>Email</span>
            <input class="login-input" type="email" name="email" required autocomplete="email" />
          </label>
          <label class="field">
            <span>Password</span>
            <input class="login-input" type="password" name="password" required autocomplete="current-password" />
          </label>
          <button type="submit" class="login-btn login-btn--primary">Sign in</button>
        </form>

        <form id="form-register" class="auth-form is-hidden" data-panel="register">
          <label class="field">
            <span>Full name</span>
            <input class="login-input" type="text" name="name" required autocomplete="name" />
          </label>
          <label class="field">
            <span>Email</span>
            <input class="login-input" type="email" name="email" required autocomplete="email" />
          </label>
          <label class="field">
            <span>Password</span>
            <input class="login-input" type="password" name="password" required minlength="6" autocomplete="new-password" />
          </label>
          <label class="field">
            <span>Confirm password</span>
            <input class="login-input" type="password" name="confirm" required minlength="6" autocomplete="new-password" />
          </label>
          <button type="submit" class="login-btn login-btn--primary">Create account</button>
        </form>

        <div class="auth-divider"><span>or continue with</span></div>

        <div id="google-btn-wrap" class="google-wrap">
          <p id="google-hint" class="google-hint is-hidden">
            Add <code>GOOGLE_CLIENT_ID</code> to <code>.env</code> to enable Google Sign-In
          </p>
          <div id="google-btn"></div>
        </div>

        <p id="auth-error" class="auth-error" role="alert" hidden></p>
      </div>
    </main>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="/js/api.js"></script>
    <script src="/js/login.js"></script>
  </body>
</html>
